# Lords Mobile Bot Configuration
# Generated automatically. Edit this file to configure the bot.
# Project: https://github.com/halloweeks/lords-mobile-bot
# Docs: https://github.com/halloweeks/lords-mobile-bot/blob/main/docs/configuration.md

# Gateway server
server.addr = 192.243.44.63
server.port = 5999

# Client version
client.version_major = 2
client.version_minor = 197
client.version_patch = 308
client.language_code = 1

# Directory used to store bot data (logs, databases, cache, etc.).
data.path = /sdcard/lmbot/

# Privileged player.
# This player can execute administrator commands and bypass normal restrictions.
admin.name = halloweeks

# Replace the example values below with your own account information.
account.igg_id      = YOUR_NUMERIC_ID_HERE
account.device_uuid = YOUR_DEVICE_UUID_HERE
account.access_key  = YOUR_ACCESS_KEY_HERE

# Prefix used to identify bot commands.
command.prefix = $

# Command channels: WORLD, GUILD, MAIL
command.input  = GUILD
command.output = MAIL

# Bank
# Master switch for the banking system.
# When enabled, the bot accepts and processes banking commands.
# When disabled, all banking commands are ignored.
bank.enabled = false

# Resource types allowed for delivery.
bank.send_food = false
bank.send_rock = false
bank.send_wood = false
bank.send_ore  = false
bank.send_gold = false

# Resource reserve.
# These values are reserved for the bot's own use. The bot will not send
# resources that would reduce the balance below these amounts.
bank.reserve_food = 20M
bank.reserve_rock = 50M
bank.reserve_wood = 50M
bank.reserve_ore  = 30M
bank.reserve_gold = 0

# Maximum map distance (tiles) for resource delivery.
bank.max_delivery_distance = 100

# Automatically use resource items from the bag if the available
# resources are insufficient to fulfill a banking command.
bank.use_bag_rss  = false
bank.use_bag_food = false
bank.use_bag_rock = false
bank.use_bag_wood = false
bank.use_bag_ore  = false
bank.use_bag_gold = false

# Alliance
# Automatically send Guild Help to guild members whenever available.
# Helping guild members reduces their timers and earns Guild Coins.
alliance.auto_help = false

# Automatically open Alliance Gift chests and claim all available rewards.
alliance.auto_open_gifts = false

# Enable or disable all automatic protection features.
protection.enabled = false

# Keep a shield active at all times.
protection.shield_always_on = false

# Automatically use a shield when an incoming attack is detected.
protection.shield_on_incoming_attack = false

# Automatically use a shield when an incoming scout is detected.
protection.shield_on_incoming_scout = false

# Shield priority list.
# The bot will use the first available shield in this order.
# Available shields:
# SHIELD_4H, SHIELD_8H, SHIELD_12H, SHIELD_1D, SHIELD_3D, SHIELD_7D, SHIELD_14D
protection.shield_priority = SHIELD_4H, SHIELD_8H, SHIELD_12H, SHIELD_1D


# Automatically recall marches when an incoming attack is detected.
protection.recall_on_incoming_attack = false

# Automatically recall marches when an incoming scout is detected.
protection.recall_on_incoming_scout = false

# Automatically recalls a gathering or camp march before it reaches
# its destination when an incoming conflict is detected.
# Requires Withdraw Squad items; otherwise no action is taken.
protection.recall_on_incoming_conflict = false

# Currently this feature not available
# protection.shelter_always = false
# protection.shelter_leader = true
# protection.shelter_troops = false
# protection.shelter_on_incoming_attack = true
# protection.shelter_on_incoming_scout = true

# Cargo Ship Trading
# Automatically completes Cargo Ship trades.
cargo_ship.auto_trade  = false
# The options below specify which resources the bot is allowed to spend.
cargo_ship.spend_food  = false
cargo_ship.spend_rock  = false
cargo_ship.spend_wood  = false
cargo_ship.spend_ore   = false
cargo_ship.spend_gold  = false

# Use resource items from the bag when required to complete a trade.
# If disabled, the bot will never consume bag resource items.
cargo_ship.use_bag_rss = false

# Resource reserve limits.
# The bot always keeps at least this amount and only spends the excess.
# Set to 0 to disable the reserve.
cargo_ship.reserve_food = 10M
cargo_ship.reserve_rock = 10M
cargo_ship.reserve_wood = 10M
cargo_ship.reserve_ore  = 10M
cargo_ship.reserve_gold = 10M

# Allowed Items (The bot WILL buy these)
cargo_ship.trade_for_archaic_tomes      = true
cargo_ship.trade_for_bright_talent_orb  = true
cargo_ship.trade_for_exp_elixir         = true
cargo_ship.trade_for_speed_up           = true
cargo_ship.trade_for_speed_up_research  = true

# Blocked Items (The bot WILL ignore these)
cargo_ship.trade_for_speed_up_training  = false
cargo_ship.trade_for_speed_up_merging   = false
cargo_ship.trade_for_anima = false

# Trades resources
cargo_ship.trade_for_food  = false
cargo_ship.trade_for_rock  = false
cargo_ship.trade_for_wood  = false
cargo_ship.trade_for_ore   = false
cargo_ship.trade_for_gold  = false
